services:
  # Frontend Application (Next.js + PixiJS)
  - type: web
    name: tactico-frontend
    env: node
    region: oregon
    plan: starter
    buildCommand: pnpm install && pnpm --filter frontend build
    startCommand: pnpm --filter frontend start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false
        # User will need to set this to the Render URL of tactico-backend
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true

  # Backend API Service (Next.js API + Socket.io)
  - type: web
    name: tactico-backend
    env: node
    region: oregon
    plan: starter
    buildCommand: pnpm install && pnpm --filter backend build
    startCommand: pnpm --filter backend start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: BZZOIRO_API_KEY
        sync: false
