services:
  # Tactico Application (Combined Frontend + Backend)
  - type: web
    name: tactico
    env: node
    region: oregon
    plan: starter
    buildCommand: pnpm install && pnpm turbo run build --filter=@tactico/app
    startCommand: pnpm --filter @tactico/app start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: BZZOIRO_API_KEY
        sync: false
